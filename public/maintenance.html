<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Keepsy — Back Shortly</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;1,9..144,400&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: #F9F8F6;
      color: #2D2926;
      font-family: 'Fraunces', Georgia, 'Times New Roman', serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1.25rem;
      text-align: center;
    }

    .container {
      max-width: 520px;
      width: 100%;
    }

    .wordmark {
      font-family: 'Fraunces', Georgia, 'Times New Roman', serif;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #2B4038;
      margin-bottom: 3rem;
    }

    .divider {
      width: 40px;
      height: 2px;
      background-color: #C4714A;
      margin: 0 auto 3rem;
      border: none;
    }

    .label {
      font-family: 'Fraunces', Georgia, 'Times New Roman', serif;
      font-size: 0.6875rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      color: #C4714A;
      margin-bottom: 1.25rem;
    }

    h1 {
      font-family: 'Fraunces', Georgia, 'Times New Roman', serif;
      font-size: clamp(1.75rem, 5vw, 2.75rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.15;
      color: #2B4038;
      margin-bottom: 1.25rem;
    }

    .subtext {
      font-family: 'Fraunces', Georgia, 'Times New Roman', serif;
      font-size: 1rem;
      line-height: 1.75;
      color: rgba(45, 41, 38, 0.65);
      margin-bottom: 2.5rem;
    }

    .contact {
      font-family: 'Fraunces', Georgia, 'Times New Roman', serif;
      font-size: 0.8125rem;
      color: rgba(45, 41, 38, 0.45);
    }

    .contact a {
      color: #C4714A;
      text-decoration: none;
    }

    .contact a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="wordmark">Keepsy</p>
    <hr class="divider" />
    <p class="label">Maintenance</p>
    <h1>We&rsquo;re making Keepsy even better</h1>
    <p class="subtext">
      We&rsquo;re doing a quick upgrade and will be back shortly.<br />
      Thanks for your patience.
    </p>
    <p class="contact">
      For urgent orders, email&nbsp;<a href="mailto:hello@keepsy.store">hello@keepsy.store</a>
    </p>
  </div>
</body>
</html>
